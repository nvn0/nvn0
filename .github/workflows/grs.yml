name: Update GitHub Stats

on:
  schedule:
    - cron: "0 3 * * *" # todos os dias às 03:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Generate Top Languages
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          path: assets/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}
          options: > 
            username=${{ github.repository_owner }}
            &layout=compact
            &theme=tokyonight
            &langs_count=8
            &hide=html,css,jupyter%20notebook,yara

      - name: Commit changes
        run: |
          git config user.name github-actions
          git config user.email github-actions@users.noreply.github.com
          git add assets/top-langs.svg
          git commit -m "Update stats" || exit 0
          git push
